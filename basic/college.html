<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>College Bus Registration</title>
    <link rel="stylesheet" href="college.css" />
  </head>
  <body>
    <div id="app" class="container">
      <h1>College Bus Registration</h1>
      <div id="step1" class="step">
        <label for="college-name">College Name</label>
        <input type="text" id="college-name" placeholder="Enter College Name" />

        <label for="num-routes">Number of Bus Routes</label>
        <input
          type="number"
          id="num-routes"
          placeholder="Enter number of bus routes"
        />

        <button onclick="goToStep(2)">Next</button>
      </div>

      <div id="step2" class="step hidden">
        <h2>Bus Routes</h2>
        <div id="routes-container">
          <label>Bus Route 1</label>
          <input
            type="number"
            placeholder="Enter number of buses for route 1"
          />
        </div>
        <button onclick="goToStep(3)">Next</button>
      </div>

      <div id="step3" class="step hidden">
        <h2>Bus Details</h2>
        <label for="bus-number">Bus Number Plate</label>
        <input type="text" id="bus-number" placeholder="Enter bus number" />

        <label for="insurance">Insurance Document</label>
        <input type="file" id="insurance" />

        <button onclick="goToStep(4)">Next</button>
      </div>

      <div id="step4" class="step hidden">
        <h2>Confirmation</h2>
        <p>Confirm the details and generate ID</p>
        <button onclick="submitForm()">Submit</button>
      </div>
    </div>

    <script src="college.js"></script>
  </body>
</html>
