<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Driver Dashboard</title>
    <link rel="stylesheet" href="driver.css" />
  </head>
  <body>
    <div class="container">
      <h1>Driver Dashboard</h1>

      <label for="driver-name">Driver Name</label>
      <input type="text" id="driver-name" placeholder="Enter your name" />

      <label for="route-number">Route Number</label>
      <input
        type="number"
        id="route-number"
        placeholder="Enter your route number"
      />

      <div class="toggle-location">
        <label for="location-sharing">Location Sharing</label>
        <input type="checkbox" id="location-sharing" />
      </div>

      <button onclick="updateDriverInfo()">Update Info</button>

      <div class="notifications">
        <h2>Notifications</h2>
        <ul id="notification-list">
          <!-- Notification items will be inserted here dynamically -->
        </ul>
      </div>
    </div>

    <script src="driver.js"></script>
  </body>
</html>
