<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="student.css" />
  </head>
  <body>
    <div class="min-h-screen bg-gradient">
      <div class="card">
        <header class="card-header">
          <h1>Student Dashboard</h1>
          <p>Track your bus, report absences, and view updates</p>
        </header>
        <div class="card-content">
          <div class="tabs">
            <button class="tablinks" onclick="openTab(event, 'bus')">
              Bus Tracking
            </button>
            <button class="tablinks" onclick="openTab(event, 'absence')">
              Report Absence
            </button>
            <button class="tablinks" onclick="openTab(event, 'late')">
              Running Late
            </button>
          </div>

          <div id="bus" class="tabcontent">
            <label for="bus-select">Select Your Bus</label>
            <select id="bus-select" onchange="handleBusSelection(this.value)">
              <option value="">Select a bus</option>
              <option value="bus1">Bus 1</option>
              <option value="bus2">Bus 2</option>
              <option value="bus3">Bus 3</option>
            </select>
            <div id="bus-info" class="hidden">
              <h3>Bus Location</h3>
              <p>
                <span id="bus-lat">Lat: 0.0000</span>,
                <span id="bus-lng">Lng: 0.0000</span>
              </p>
              <p>
                Estimated Arrival:
                <span id="estimated-arrival">15 minutes</span>
              </p>
            </div>
          </div>

          <div id="absence" class="tabcontent hidden">
            <label for="absence-reason">Reason for Absence</label>
            <input
              type="text"
              id="absence-reason"
              placeholder="e.g., Sick, Family emergency"
            />
            <label for="absence-duration">Duration (days)</label>
            <input type="number" id="absence-duration" value="1" min="1" />
            <button onclick="reportAbsence()">Report Absence</button>
          </div>

          <div id="late" class="tabcontent hidden">
            <label for="late-minutes">Minutes Late</label>
            <input type="number" id="late-minutes" value="5" min="5" step="5" />
            <button onclick="reportLate()">Report Late Arrival</button>
          </div>
        </div>
      </div>
    </div>

    <script src="student.js"></script>
  </body>
</html>
